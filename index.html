<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>ANAS JEANS</title><style>
body{font-family:Arial;margin:0;background:#111;color:#fff}header{background:#000;padding:15px;display:flex;justify-content:space-between}.logo{color:gold;font-size:28px;font-weight:bold}
section{padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.card{background:#222;padding:10px;border-radius:8px}.card img{width:100%;height:220px;object-fit:cover}.btn{background:gold;border:0;padding:8px 12px;cursor:pointer}
#admin{display:none;background:#1b1b1b}input,textarea{width:100%;padding:8px;margin:5px 0}
</style></head><body>
<header><div class='logo'>ANAS JEANS</div><button class='btn' onclick='login()'>Admin</button></header>
<section><h2>Products</h2><div id='products' class='grid'></div></section>
<section id='admin'><h2>Admin Panel</h2>
<input id='name' placeholder='Product Name'><input id='price' placeholder='Price'>
<textarea id='desc' placeholder='Description'></textarea>
<input id='img' type='file' accept='image/*'>
<button class='btn' onclick='addProduct()'>Add Product</button></section>
<script>
let products=JSON.parse(localStorage.getItem('anasProducts')||'[]');
if(products.length==0){products=[{name:'Blue Jeans',price:'3999',desc:'Premium Denim',img:'https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=700&q=80'}];save();}
function save(){localStorage.setItem('anasProducts',JSON.stringify(products));render();}
function render(){let p=document.getElementById('products');p.innerHTML='';products.forEach((x,i)=>p.innerHTML+=`<div class='card'><img src="${x.img}"><h3>${x.name}</h3><p>Rs. ${x.price}</p><p>${x.desc}</p><button class='btn' onclick='del(${i})'>Delete</button></div>`)}
function del(i){products.splice(i,1);save();}
function login(){let p=prompt('Enter Admin Password');if(p==='javeria'){document.getElementById('admin').style.display='block';alert('Welcome Admin');}else if(p)alert('Wrong Password');}
function addProduct(){
let f=document.getElementById('img').files[0];
if(!f){alert('Choose image');return;}
let r=new FileReader();
r.onload=e=>{products.push({name:name.value,price:price.value,desc:desc.value,img:e.target.result});save();name.value=price.value=desc.value='';img.value='';}
r.readAsDataURL(f);
}
render();
</script></body></html>
