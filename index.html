<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ANAS DENIM JEANS</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f4f4;
    color:#333;
}

header{
    background:#111;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 60px;
    position:sticky;
    top:0;
}

header h1{
    color:#3fa9f5;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
    transition:.3s;
}

nav a:hover{
    color:#3fa9f5;
}

.hero{
    background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
    url("https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=1400");
    background-size:cover;
    background-position:center;
    height:500px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero h2{
    font-size:55px;
}

.hero p{
    margin:20px 0;
    font-size:20px;
}

.btn{
    background:#3fa9f5;
    color:white;
    padding:15px 35px;
    text-decoration:none;
    border-radius:5px;
    display:inline-block;
}

.btn:hover{
    background:#111;
}

.products{
    padding:60px;
    text-align:center;
}

.products h2{
    margin-bottom:40px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,.15);
    transition:.4s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:300px;
    object-fit:cover;
}

.card h3{
    margin:15px;
}

.price{
    color:red;
    font-size:22px;
    font-weight:bold;
}

button{
    background:#111;
    color:white;
    border:none;
    padding:12px 25px;
    margin:20px;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#3fa9f5;
}
