<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'>
<title>ANAS JEANS</title><style>
body{font-family:Arial;margin:0;background:#111;color:#fff}header{background:#000;padding:15px;display:flex;justify-content:space-between}.logo{color:gold;font-size:28px;font-weight:bold}
section{padding:20px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.card{background:#222;padding:10px;border-radius:8px}.card img{width:100%;height:220px;object-fit:cover}.btn{background:gold;border:0;padding:8px 12px;cursor:pointer}
#admin{display:none;background:#1b1b1b}input,textarea{width:100%;padding:8px;margin:5px 0}
</style></head><body>
<header><div class='logo'>ANAS JEANS</div><button class='btn' onclick='login()'>Admin</button></header>
<section><h2>Products</h2><div id='products' class='grid'></div></section>
<section id='admin'><h2>Admin Panel</h2>
<input id='name' placeholder='Product Name'><input id='price' placeholder='Price'>
<textarea id='desc' placeholder='Description'></textarea>
<input id='img' type='file' accept='image/*'>
<button class='btn' onclick='addProduct()'>Add Product</button></section>
<script>
<script>
let isAdmin = false;

let products = JSON.parse(localStorage.getItem("anasProducts") || "[]");

if(products.length===0){
products=[
{
name:"Blue Jeans",
price:"3999",
desc:"Premium Denim",
img:"https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&w=700&q=80"
}
];
save();
}

function save(){
localStorage.setItem("anasProducts",JSON.stringify(products));
render();
}

function render(){

const container=document.getElementById("products");
container.innerHTML="";

products.forEach((p,index)=>{

container.innerHTML+=`
<div class="card">

<img src="${p.img}" alt="${p.name}">

<h3>${p.name}</h3>

<p><b>Rs. ${p.price}</b></p>

<p>${p.desc}</p>

${isAdmin ? `<button class="btn" onclick="del(${index})">Delete</button>` : ""}

</div>
`;

});

}

function del(i){

if(confirm("Delete this product?")){
products.splice(i,1);
save();
}

}

function login(){

let pass=prompt("Enter Admin Password");

if(pass==="javeria"){

isAdmin=true;

document.getElementById("admin").style.display="block";

render();

alert("Welcome Admin");

}else if(pass){

alert("Wrong Password");

}

}

function addProduct(){

const productName=document.getElementById("name").value.trim();

const productPrice=document.getElementById("price").value.trim();

const productDesc=document.getElementById("desc").value.trim();

const image=document.getElementById("img");

if(productName===""||productPrice===""||productDesc===""){

alert("Please fill all fields.");

return;

}

if(image.files.length===0){

alert("Please choose an image.");

return;

}

const reader=new FileReader();

reader.onload=function(e){

products.push({

name:productName,

price:productPrice,

desc:productDesc,

img:e.target.result

});

save();

document.getElementById("name").value="";

document.getElementById("price").value="";

document.getElementById("desc").value="";

image.value="";

alert("Product Added Successfully!");

};

reader.readAsDataURL(image.files[0]);

}

render();
</script>
